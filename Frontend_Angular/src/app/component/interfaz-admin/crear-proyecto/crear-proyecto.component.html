<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%;">
      <h2 class="text-center mb-2 mt-4">Apeiroo Rooms</h2>
      <h5 class="text-center mb-4 mt-4">Añadir proyecto</h5>
      <p class="text-center mb-4">Agrega un proyecto nuevo</p>
      <form [formGroup]="newproject" (ngSubmit)="submitedForm()">

        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre proyecto</label>
          <input
            id="nombre"
            formControlName="nombre"
            type="text"
            class="form-control"
            placeholder="Ingresa el nombre del proyecto"
          />
          @if (isInvalid('nombre')) {
            <span class="text-danger">Rellene este campo</span>

            }
        </div>
        
        <div class="d-flex justify-content-between gap-2">
            <button
              type="button"
              class="btn btn-secondary w-50"
              [routerLink]="['/reservas']"
              [queryParams]="{ sala: 'upper' }"
              routerLinkActive="router-link-active"
            >
              Volver atrás
            </button>
            <button
              type="submit"
              class="btn btn-primary w-50"
            >
              Ingresar
            </button>
          </div>
      </form>
    </div>
  </div>
