<div class="container">
    <h1>Lista de Proyectos</h1>
    <div *ngIf="!tieneAcceso" class="alert alert-danger">
      No tienes permisos para acceder a esta página.
    </div>
    <div *ngIf="usuarios.length === 0 && tieneAcceso" class="alert alert-warning">
      No hay proyectos disponibles.
    </div>
    <button *ngIf="tieneAcceso" class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#crearProyectoModal">
      Crear Proyecto
    </button>
    <div *ngIf="usuarios.length > 0 && tieneAcceso" class="table-responsive">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Correo electrónico</th>
            <th>Nombre de usuario</th>
            <th>Rol</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of usuarios">
            <td>{{ u.email }}</td>
            <td>{{ u.username }}</td>
            <td>{{ u.roles }}</td>
            <td>
              <button *ngIf="u.email !== usuario.email" class="btn btn-danger btn-sm" (click)="eliminarUsuario(u.id)">
                Eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  
    <button class="btn btn-secondary mb-3" (click)="volverAReservas()">Volver a Reservas</button>
  
   
  
    
</div>
