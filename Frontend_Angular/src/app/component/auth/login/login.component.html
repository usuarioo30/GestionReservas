<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%;">
    <h2 class="text-center mb-2 mt-4">Apeiroo Rooms</h2>
    <h5 class="text-center mb-4 mt-4">Iniciar Sesión</h5>
    <p class="text-center mb-4">Inicia sesión para reservar tu sala</p>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="username" class="form-label">Usuario</label>
        <input
          id="username"
          formControlName="username"
          type="text"
          class="form-control"
          placeholder="Ingresa tu usuario"
        />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input
          id="password"
          formControlName="password"
          type="password"
          class="form-control"
          placeholder="*****************"
          />
      </div>
      <button
        type="submit"
        class="btn btn-primary w-100 mb-0"
        [disabled]="loginForm.invalid">
        Ingresar
      </button>
      <div class="divider d-flex align-items-center my-4">
        <p class="text-center fw-bold mx-3 mb-0 text-mutedx">or continue with</p>
      </div>
    </form>
    <button class="btn btn-secondary w-100" (click)="loginWithGoogle()">
      <i class="bi bi-google google"></i> Iniciar sesión con Google
    </button>
  </div>
</div>
